version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mewada_user
      POSTGRES_PASSWORD: mewada_password
      POSTGRES_DB: mewada_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mewada_user -d mewada_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://mewada_user:mewada_password@db:5432/mewada_db
      SECRET_KEY: dev-secret-key-change-in-production
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production
      UPLOAD_FOLDER: /app/app/uploads
      BASE_URL: http://localhost:5000
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USE_TLS: "true"
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_DEFAULT_SENDER: ""
      FLASK_ENV: development
    volumes:
      - .:/app
      - uploads:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
