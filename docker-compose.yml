version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kmrgp-postgres
    environment:
      POSTGRES_USER: kmrgp
      POSTGRES_PASSWORD: kmrgp123
      POSTGRES_DB: kmrgp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmrgp -d kmrgp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
