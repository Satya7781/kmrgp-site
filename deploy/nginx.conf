server {
    listen 80;
    server_name YOUR_DOMAIN_HERE www.YOUR_DOMAIN_HERE;

    # Allow up to 35 MB uploads (a little above the Flask 30 MB limit)
    client_max_body_size 35M;

    # Security headers
    add_header X-Frame-Options         "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-XSS-Protection        "1; mode=block"                 always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Serve uploaded profile images with long caching
    location /uploads/ {
        alias /var/www/mewada/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff"    always;
    }

    # Proxy all other requests to Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       'upgrade';
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout    120s;
        proxy_connect_timeout  60s;
        proxy_send_timeout    120s;
    }

    # Deny access to dot-files (e.g. .env)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
# HTTPS block is added automatically by: sudo certbot --nginx -d YOUR_DOMAIN_HERE
